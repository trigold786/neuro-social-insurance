worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    upstream account_center {
        server account-center:30311;
    }
    upstream policy_hub {
        server policy-hub:30312;
    }
    upstream actuarial_engine {
        server actuarial-engine:30313;
    }
    upstream nsi_business {
        server nsi-business:30314;
    }
    upstream config_service {
        server config-service:30315;
    }
    upstream admin_web {
        server admin-web:30301;
    }

    server {
        listen 30310;
        server_name localhost;

        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Admin Web 管理后台
        location /admin/ {
            proxy_pass http://admin_web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check proxies
        location /api/v1/account/health {
            proxy_pass http://account_center/health;
        }
        location /api/v1/policies/health {
            proxy_pass http://policy_hub/health;
        }
        location /api/v1/business/health {
            proxy_pass http://nsi_business/health;
        }
        location /api/v1/configs/health {
            proxy_pass http://config_service/health;
        }
        location /api/v1/calc/health {
            proxy_pass http://actuarial_engine/health;
        }

        # API 路由 (strip /api, keep /v1/...)
        location /api/v1/auth/ {
            proxy_pass http://account_center/v1/auth/;
        }
        location /api/v1/users/ {
            proxy_pass http://account_center/v1/users/;
        }
        location /api/v1/orgs/ {
            proxy_pass http://account_center/v1/orgs/;
        }
        location /api/v1/policy-hub/ {
            proxy_pass http://policy_hub/v1/;
        }
        location /api/v1/calc/ {
            proxy_pass http://actuarial_engine/v1/calc/;
        }
        location /api/v1/profiles/ {
            proxy_pass http://nsi_business/v1/profiles/;
        }
        location /api/v1/reports/ {
            proxy_pass http://nsi_business/v1/reports/;
        }
        location /api/v1/configs/ {
            proxy_pass http://config_service/v1/configs/;
        }

        # C端静态资源（nsi-mobile PWA）
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
